<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

</head>

<div class="container">

    <!-- LEFT SIDE -->

        <header class="header">

            <!-- LOGO + BRAND TEXT WRAPPED IN FLEX CONTAINER -->
            <div class="logo-container">

                <img src="images/MyLifeAidLogo.png" height="80" alt="logo" class="logo">

                <h2 class="brand-name">
                     <span class="my">MY</span><span class="life">Life</span><span class="aid">Aid</span>
                </h2>

            </div>

        </header>

        <div class="hero-text">
            <h1>
                Your Health.<br>
                Our Precision.<br>
                One Tap Away.
            </h1>

            <p>
                From checking hospital location to AI-assisted care
                navigation in seconds.....
            </p>

            <div class="buttons">

    <button class="nav-btn patient-btn" onclick="window.location.href='welcome.html'">
        I'M A PATIENT
    </button>

    <button class="nav-btn staff-btn" onclick="window.location.href='staff_index.html'">
        I'M STAFF
    </button>

</div>

            <p class="trust-text">
                Trusted by 200+ clinics and 500+ patients
            </p>
        </div>

       <footer>

    <a href="#" onclick="goToHelp(this)">Help</a>
    <a href="#">|</a>

    <a href="#" onclick="goToContact(this)">Contact</a>
    <a href="#">|</a>

    <a href="#" onclick="goToAbout(this)">About Us</a>

</footer>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right-panel">

        <button class="learn-more" onclick="goToLearnMore(this)">
    Learn More
</button>

                  <div class="card location-card">
                <img src="images/find care 1.png" height="80" alt="findCare">
                <span>Find care</span>
            </div>

            <div class="card booking-card">
                <img src="images/book.png" height="80" alt="book">
                <span>Book fast</span>
            </div>

            <div class="card live-card">
                <img src="images/live better.png" height="80" alt="findCare">
                <span>Live Better</span>
            </div>

    </div>

</div>

<script src="welcome.js"></script>
