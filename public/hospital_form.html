<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- Hospital form used to collect information about hospitals-->
    <h1 style="text-align: center;">Hospital Form</h1>
    <p>This form is used to collect information about hospitals that would like to be in our platform for efficient patient care around South Africa.</p>
    <form id="hospital-form">
        <div>
        <label for="name">Hospital Name:</label>
        <input type="text" id="name" name="name" required placeholder="Charlotte Maxeke Hospital">
        </div>
        <div>
        <label for="address">Address:</label>
        <input type="text" id="address" name="address" required placeholder="123 Main St, Johannesburg">
        </div>
        <div>
        <label for="contact">Contact Information:</label>
        <input type="text" id="contact" name="contact" required placeholder="Phone number">
        </div>
        <div>
        <label for="email">Email Address:</label>
        <input type="email" id="email" name="email" required>
        </div>
        <div>
        <label for="beds">Number of Beds Available:</label>
        <input type="number" id="beds" name="beds" required>
        </div>  
        <div>
        <label for="emergency">No. of Emergency Slots Available:</label>
        <input type="number" id="emergency" name="emergency" required>
        </div>
        
        <!--Operating Hours-->
        <h3 style="text-align: center;">Operating Hours:</h3>
        <p1>NB: If a day is not applicable, please type "closed".</p1>
        <div>
        <label for="monday">Monday:</label>
        <input type="text" id="monday" name="monday" required placeholder="8:00 AM - 5:00 PM">
        </div>
        <div>
        <label for="tuesday">Tuesday:</label>
        <input type="text" id="tuesday" name="tuesday" required placeholder="8:00 AM - 5:00 PM">
        </div>
        <div>
        <label for="wednesday">Wednesday:</label>
        <input type="text" id="wednesday" name="wednesday" required placeholder="8:00 AM - 5:00 PM">
        </div>
        <div>
        <label for="thursday">Thursday:</label>
        <input type="text" id="thursday" name="thursday" required placeholder="8:00 AM - 5:00 PM">
        </div>
        <div>
        <label for="friday">Friday:</label>
        <input type="text" id="friday" name="friday" required placeholder="8:00 AM - 5:00 PM">
        </div>
        <div>
        <label for="saturday">Saturday:</label>
        <input type="text" id="saturday" name="saturday" required placeholder="8:00 AM - 5:00 PM">
        </div>
        <div>
        <label for="sunday">Sunday:</label>
        <input type="text" id="sunday" name="sunday" required placeholder="8:00 AM - 5:00 PM">
        </div>
        <button type="submit">Submit</button>
    </form>

</body>

<script>

</script>
</html>
