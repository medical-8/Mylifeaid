<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1 style="text-align: center;">Signup</h1>
    <p style="text-align: center;">Please fill in the form below to create an account for your hospital.</p>
    <form id="signup-form" style="display: flex; flex-direction: column; align-items: center;">
        <div>
        <label for="email">Email:</label>
        <input type="text" id="email" name="email" required>
        </div>
        <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        </div>

        <button id="signup-submit-btn"  type="submit">Submit</button>
    </form>
    
    <p style ="text-align: center;" >Already have an account? <a href="login.html">Login</a></p>

    <script type="module" src="./signup.js"></script>
</body>
</html>
