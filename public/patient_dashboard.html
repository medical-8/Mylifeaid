<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Dashboard | MyLifeAid</title>
    
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="navbar.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <style>
        /* A few fallback styles to ensure the popup looks good */
        #popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 999; display: none;
        }
    </style>
</head>
<body>

  <!-- ================= NAVBAR ================= -->
  <nav class="navbar">
    <div class="logo-group">
      <img src="MYAID-LOGO.png" alt="MyAid Logo" class="logo-img">
      <div class="logo-text">
        <a href="#">
          <span class="my">MY</span>
          <span class="life">Life</span>
          <span class="aid">Aid</span>
        </a>
      </div>
    </div>
    
    <div class="navbar-right">
      <div class="user-icon" id="userButton">
        <i class='bx bxs-user-circle'></i>
      </div>
    </div>
    <button id="logOutBtn" style="color: white; background-color: #E63946; border-radius: 8px; padding: 10px; font-size: medium; cursor: pointer; border: none;">Logout</button>
  </nav>

  <!-- Map container -->
  <div id="map" style="height: 400px; width: 100%; z-index: 1; margin: 40px auto;"></div>

  <!--Bottom sheet-->
  <div id="container">
        <!--Search bar and pin button-->
      <input id="search-bar" placeholder="Search for a hospital/clinic..." style="width: 90%; margin: 80px auto; display: block; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px; bottom: auto;">
      <section id="filter-by">
          <button id="filter-btn" class="filter-btn" style="padding: 10px 20px; background: #1D4352; color: white; border: none; border-radius: 6px; cursor: pointer;">Filter by</button>
          
          <div id="filter-dropdown" class="filter-drop" style="display: none; margin-top: 10px;">
              <button id="beds-filter" class="filter-btn" style="margin-right: 10px; padding: 8px; cursor: pointer;">Beds</button>
              <button id="emergency-filter" class="filter-btn" style="margin-right: 10px; padding: 8px; cursor: pointer;">Emergency Slots</button>
              <button id="distance-filter" class="filter-btn" style="padding: 8px; cursor: pointer;">Distance</button>
          </div>
      </section>

      <!--Hospital/Clinic Cards-->
      <div id="cards-container">
          <p style="text-align: center;">Loading nearby healthcare facilities...</p>
      </div>
  </div>

  <div id="popup-overlay"></div>

  <!-- Leaflet JavaScript (without integrity check) -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- ================= FIREBASE & LOGIC ================= -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, addDoc, updateDoc, doc,increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyABwRJyK5SdeC4FM0jTbnVbiV4hU3TXB6I",
      authDomain: "mylaid-f9947.firebaseapp.com",
      projectId: "mylaid-f9947",
      storageBucket: "mylaid-f9947.firebasestorage.app",
      messagingSenderId: "315125553793",
      appId: "1:315125553793:web:af4ac3618e0531fa190b80"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ================= GLOBAL VARIABLES =================
    let allHospitals = [];
    let mapMarkers = [];
    let userLat = null;
    let userLng = null;
    let marker, circle, zoomed;
    let map;

    // ================= INITIALIZE MAP =================
    function initializeMap() {
        try {
            map = L.map('map').setView([-26.2041, 28.0473], 12); // Default to Johannesburg
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            console.log("Map initialized successfully");
        } catch (error) {
            console.error("Error initializing map:", error);
        }
    }

    const genericIcon = L.icon({
        iconUrl: 'images/generic.png',
        iconSize: [30, 30]
    });

    // ================= GEOLOCATION =================
    function handleGeolocationSuccess(position) {
        try {
            userLat = position.coords.latitude;
            userLng = position.coords.longitude;
            const accuracy = position.coords.accuracy;

            if (marker) {
                map.removeLayer(marker);
                map.removeLayer(circle);
            }

            marker = L.marker([userLat, userLng]).addTo(map).bindPopup("<b>You are here</b>");
            circle = L.circle([userLat, userLng], {radius: accuracy}).addTo(map);

            if (!zoomed) {
                zoomed = map.fitBounds(circle.getBounds());
                // Once we have location, re-calculate distances if data is already loaded
                if(allHospitals.length > 0) {
                    calculateDistances();
                    renderHospitals(allHospitals);
                }
            }
        } catch (error) {
            console.error("Error in geolocation success:", error);
        }
    }

    function handleGeolocationError(err) {
        try {
            if (err.code === 1) {
                console.warn("Location access denied.");
            } else {
                console.warn("Unable to retrieve location.");
            }
        } catch (error) {
            console.error("Error in geolocation error handler:", error);
        }
    }

    navigator.geolocation.watchPosition(handleGeolocationSuccess, handleGeolocationError);

    // Haversine formula to calculate distance in km
    function getDistance(lat1, lon1, lat2, lon2) {
        try {
            if(!lat1 || !lon1 || !lat2 || !lon2) return Infinity;
            const R = 6371; 
            const dLat = (lat2 - lat1) * (Math.PI / 180);
            const dLon = (lon2 - lon1) * (Math.PI / 180);
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * (Math.PI / 180)) * Math.cos(lat2 * (Math.PI / 180)) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return parseFloat((R * c).toFixed(1));
        } catch (error) {
            console.error("Error calculating distance:", error);
            return Infinity;
        }
    }

    function calculateDistances() {
        try {
            allHospitals.forEach(function(h) {
                if(userLat && userLng) {
                    h.distance = getDistance(userLat, userLng, h.lat, h.lng);
                } else {
                    h.distance = Infinity; 
                }
            });
        } catch (error) {
            console.error("Error calculating distances:", error);
        }
    }

    // ================= FETCH DATA =================
    async function fetchHospitals() {
        try {
            const querySnapshot = await getDocs(collection(db, "healthcare_services"));
            allHospitals = [];
            
            querySnapshot.forEach(function(doc) {
                try {
                    const data = doc.data();
                    allHospitals.push({
                        id: doc.id,
                        name: data.name || "Unknown Facility",
                        address: data.address || "Address not provided",
                        phone: data.phone || "No phone",
                        lat: parseFloat(data.lat),
                        lng: parseFloat(data.lng),
                        type: data.type || "Hospital",
                        email: data.email || "",
                        bedsAvailable: data.bedsAvailable || 0,
                        emergencySlotsAvailable: data.emergencySlotsAvailable || 0,
                        booking: data.booking || 0,
                        bookings: data.bookings || 0,
                        description: data.description || data.type + " located in your area.",
                        rating: data.rating || 0,
                        url: "images/generic.png", 
                        distance: Infinity
                    });
                } catch (error) {
                    console.error("Error processing hospital document:", error);
                }
            });

            calculateDistances();
            renderHospitals(allHospitals);

        } catch (error) {
            console.error("Error fetching hospitals:", error);
            document.getElementById('cards-container').innerHTML = "<p>Error loading facilities.</p>";
        }
    }

    // ================= RENDER UI & MAP PINS =================
    function renderHospitals(list) {
        try {
            const cardsContainer = document.getElementById("cards-container");
            cardsContainer.innerHTML = "";

            // Clear existing hospital map markers
            mapMarkers.forEach(function(m) {
                try {
                    map.removeLayer(m);
                } catch (error) {
                    console.error("Error removing marker:", error);
                }
            });
            mapMarkers = [];

            if(list.length === 0) {
                cardsContainer.innerHTML = "<p>No facilities found.</p>";
                return;
            }

            list.forEach(function(hospital) {
                try {
                    // 1. Create Card
                    const card = document.createElement("div");
                    card.className = "card";
                    card.style.display = "flex";
                    card.style.justifyContent = "space-between";
                    card.style.alignItems = "center";
                    card.style.fontFamily = "'Space Grotesk', sans-serif";
                    card.style.background = "#fff";
                    card.style.padding = "15px";
                    card.style.marginBottom = "15px";
                    card.style.borderRadius = "8px";
                    card.style.boxShadow = "0 4px 6px rgba(0,0,0,0.05)";
                    card.style.cursor = "pointer";

                    const distanceText = hospital.distance === Infinity ? "Calculating..." : hospital.distance + " km";

                    card.innerHTML = `
                        <div>
                            <h3 style="color:#1D4352; margin-bottom:5px;">${hospital.name.length > 13 ? hospital.name.substring(0, 13) + "..." : hospital.name}</h3>
                            <p style="font-size:14px; color:#666;"><strong>Address:</strong> ${hospital.address.length > 13 ? hospital.address.substring(0, 13) + "..." : hospital.address}</p>
                            <p style="font-size:14px; color:#666;"><strong>Booked:</strong> ${hospital.booking || 0}</p>
                            <p style="font-size:14px; color:#666;"><strong>Beds Available:</strong> ${hospital.bedsAvailable || 0}</p>
                            <p style="font-size:14px; color:#666;"><strong>Emergency Slots:</strong> ${hospital.emergencySlotsAvailable || 0}</p>
                            <p style="font-size:14px; color:#e74c3c; font-weight:600;"><strong>Distance:</strong> ${distanceText}</p>
                        </div>
                        <img src='${hospital.url}' alt='Hospital' width='90' height='90' style="border-radius:6px; object-fit:cover;">
                    `;

                    // Open Popup on Click
                    card.addEventListener("click", function() {
                        try {
                            openHospitalPopup(hospital);
                        } catch (error) {
                            console.error("Error opening hospital popup:", error);
                        }
                    });
                    cardsContainer.appendChild(card);

                    // 2. Add Map Marker
                    if(hospital.lat && hospital.lng) {
                        try {
                            const hMarker = L.marker([hospital.lat, hospital.lng], { icon: genericIcon }).addTo(map);
                            hMarker.bindPopup(`
                                <strong>${hospital.name}</strong><br>
                                ${hospital.address}<br>
                                ${hospital.phone}<br><br>
                                <a href="https://www.google.com/maps/dir/?api=1&destination=${hospital.lat},${hospital.lng}" target="_blank">Get Directions →</a>
                            `);
                            
                            hMarker.on('click', function() {
                                try {
                                    map.setView([hospital.lat, hospital.lng], 15);
                                } catch (error) {
                                    console.error("Error setting map view:", error);
                                }
                            });

                            mapMarkers.push(hMarker);
                        } catch (error) {
                            console.error("Error adding marker:", error);
                        }
                    }
                } catch (error) {
                    console.error("Error rendering hospital card:", error);
                }
            });
        } catch (error) {
            console.error("Error in renderHospitals:", error);
        }
    }

    // ================= POPUP & BOOKING LOGIC =================
    function openHospitalPopup(hospital) {
        try {
            document.getElementById('popup-overlay').style.display = 'block';

            const popUp = document.createElement("div");
            popUp.id = "hospital-popup-box";
            popUp.style.position = "fixed";
            popUp.style.width = "90%";
            popUp.style.maxWidth = "450px";
            popUp.style.top = "50%";
            popUp.style.left = "50%";
            popUp.style.transform = "translate(-50%, -50%)";
            popUp.style.background = "#1D4352";
            popUp.style.padding = "20px";
            popUp.style.boxShadow = "0 4px 15px rgba(0,0,0,0.5)";
            popUp.style.zIndex = "1000";
            popUp.style.maxHeight = "85vh";
            popUp.style.overflowY = "auto";
            popUp.style.borderRadius = "12px";
            popUp.style.color = "white";

            popUp.innerHTML = `
                <button id='close-popup' style='float:right; font-size:20px; background:none; border:none; color:white; cursor:pointer;'>✖</button>
                <h3 style='margin-bottom: 10px;'>${hospital.name}</h3>
                
                <p style='background-color: rgba(255,255,255,0.1); padding: 10px; border-radius:6px; font-size:14px; margin-bottom:10px;'>${hospital.description}</p>
                <p style='text-align: center; margin-bottom:15px;'>Rating: ${hospital.rating} / 5</p>
                
                <div style="display:flex; gap:10px; margin-bottom: 15px;">
                    <a style='flex:1; text-align:center; background-color: #2ecc71; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-weight:bold;' href='tel:${hospital.phone}'>Call Facility</a>
                    <button id='showFormBtn' style='flex:1; background-color: #3498db; color: white; border: none; padding: 10px; border-radius: 6px; font-weight:bold; cursor:pointer;'>Book</button>
                </div>

                <form id='hospital-form' style="display: none; background-color: #fff; color:#333; padding: 15px; border-radius: 8px;">
                    <h3 style="color:#1D4352; margin-bottom:15px; border-bottom: 2px solid #eee; padding-bottom:5px;">Patient Details</h3>
                    
                    <label>First Name</label>
                    <input type="text" name="firstName" required style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;">
                    
                    <label>Surname</label>
                    <input type="text" name="surname" required style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;">
                    
                    <label>ID Number</label>
                    <input type="text" name="idNumber" required style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;">
                    
                    <label>Phone Number</label>
                    <input type="tel" name="phone" required style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;">
                    
                    <label>Preferred Date</label>
                    <input type="date" name="appointmentDate" required style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;">
                    
                    <label>Preferred Time</label>
                    <input type="time" name="appointmentTime" required style="width:100%; padding:8px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;">

                    <label>Reason for visit</label>
                    <textarea name="reason" required style="width:100%; padding:8px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px; box-sizing: border-box;"></textarea>

                    <button type="submit" id="submitBookingBtn" style="width:100%; background-color: #1D4352; color: white; border: none; padding: 12px; border-radius: 6px; font-size:16px; font-weight:bold; cursor:pointer;">Submit Request</button>
                </form>
            `;

            document.body.appendChild(popUp);

            // Close logic
            document.getElementById('close-popup').onclick = function() {
                try {
                    document.body.removeChild(popUp);
                    document.getElementById('popup-overlay').style.display = 'none';
                } catch (error) {
                    console.error("Error closing popup:", error);
                }
            };

            // Toggle Form
            document.getElementById('showFormBtn').onclick = function() {
                try {
                    const form = document.getElementById('hospital-form');
                    form.style.display = form.style.display === 'none' ? 'block' : 'none';
                } catch (error) {
                    console.error("Error toggling form:", error);
                }
            };

            // Handle Submission
            document.getElementById('hospital-form').addEventListener('submit', async function(e) {
                try {
                    e.preventDefault();
                    const submitBtn = document.getElementById('submitBookingBtn');
                    submitBtn.innerText = "Submitting...";
                    submitBtn.disabled = true;

                    const formData = new FormData(e.target);
                    const bookingData = Object.fromEntries(formData.entries());
                    bookingData.status = "Pending";
                    bookingData.createdAt = new Date().toISOString();


                    try {
                        // Save inside the specific hospital's 'bookings' subcollection
                        await addDoc(collection(db, "healthcare_services", hospital.id, "bookings"), bookingData);

                        await updateDoc(doc(db, "healthcare_services", hospital.id), {
                            booking: increment(1)
                        });
                        
                        alert("Appointment request submitted successfully!");
                        try {
                            document.body.removeChild(popUp);
                        } catch (error) {
                            console.error("Error removing popup:", error);
                        }
                        document.getElementById('popup-overlay').style.display = 'none';
                    } catch (firebaseError) {
                        console.error("Error submitting booking:", firebaseError);
                        alert("Failed to submit request. Please try again.");
                        submitBtn.innerText = "Submit Request";
                        submitBtn.disabled = false;
                    }
                } catch (error) {
                    console.error("Error in form submission:", error);
                    alert("An error occurred. Please try again.");
                }
            });
        } catch (error) {
            console.error("Error opening hospital popup:", error);
            alert("Failed to open hospital details.");
        }
    }

    // ================= SEARCH & FILTERS =================
    function handleSearchInput(e) {
        try {
            const text = e.target.value.toLowerCase();
            if (text === "") {
                renderHospitals(allHospitals);
                return;
            }
            const filtered = allHospitals.filter(function(h) {
                return h.name.toLowerCase().includes(text) || h.address.toLowerCase().includes(text);
            });
            renderHospitals(filtered);
        } catch (error) {
            console.error("Error in search:", error);
        }
    }

    function handleFilterButtonClick() {
        try {
            const filterDropdown = document.getElementById('filter-dropdown');
            filterDropdown.style.display = filterDropdown.style.display === 'block' ? 'none' : 'block';
        } catch (error) {
            console.error("Error toggling filter dropdown:", error);
        }
    }

    function handleBedsFilter() {
        try {
            const sorted = allHospitals.slice().sort(function(a, b) {
                return b.beds - a.beds;
            });
            renderHospitals(sorted);
        } catch (error) {
            console.error("Error in beds filter:", error);
        }
    }

    function handleEmergencyFilter() {
        try {
            const sorted = allHospitals.slice().sort(function(a, b) {
                return b.emergencySlots - a.emergencySlots;
            });
            renderHospitals(sorted);
        } catch (error) {
            console.error("Error in emergency filter:", error);
        }
    }

    function handleDistanceFilter() {
        try {
            const sorted = allHospitals.slice().sort(function(a, b) {
                return a.distance - b.distance;
            });
            renderHospitals(sorted);
        } catch (error) {
            console.error("Error in distance filter:", error);
        }
    }

    // Attach event listeners
    try {
        document.getElementById("search-bar").addEventListener("input", handleSearchInput);
        document.getElementById("filter-btn").addEventListener("click", handleFilterButtonClick);
        document.getElementById("beds-filter").addEventListener("click", handleBedsFilter);
        document.getElementById("emergency-filter").addEventListener("click", handleEmergencyFilter);
        document.getElementById("distance-filter").addEventListener("click", handleDistanceFilter);
    } catch (error) {
        console.error("Error attaching event listeners:", error);
    }

    // ================= LOGOUT =================
    function handleLogout() {
        try {
            signOut(auth).then(function() {
                window.location.href = "welcome.html";
            }).catch(function(error) {
                console.error("Logout Error:", error);
                alert("Error logging out. Please try again.");
            });
        } catch (error) {
            console.error("Error in logout:", error);
        }
    }

    try {
        document.getElementById('logOutBtn').addEventListener('click', handleLogout);
    } catch (error) {
        console.error("Error attaching logout listener:", error);
    }

    // ================= INITIALIZE APP =================
    try {
        initializeMap();
        fetchHospitals();
    } catch (error) {
        console.error("Error initializing app:", error);
    }

  </script>
</body>
</html>
