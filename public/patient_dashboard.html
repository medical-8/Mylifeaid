L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

 //getting the user's current location and setting the view to that location
navigator.geolocation.watchPosition(success, error);


//declare marker and circle variables to be used in the success function/global scope 
let marker, circle, zoomed;


//if sucessfully got the user's location, set the view to that location
function success(position) {
    console.log(position);
    const latitude = position.coords.latitude;
    const longitude = position.coords.longitude;
    const accuracy = position.coords.accuracy;


    //uncomment the following line to set the view to the user's location automatically
    //map.setView([latitude, longitude], 13);

    //checks whether a value exist on the marker. First time, there is no value for the marker
    if (marker) {
        map.removeLayer(marker);
        map.removeLayer(circle);
    }



    marker = L.marker([latitude, longitude]).addTo(map)
    circle = L.circle([latitude, longitude], {radius: accuracy}).addTo(map);

    //constantly update the user's location on the map. Added an if to make sure that the
    //map remains in one level of zoom. First time there is no zoomed value, once it runs
    //the value is assigned to zoomed and the if statement will not run again and keeping 
    //the map zoom level the same.
    
    if (!zoomed) {
        zoomed = map.fitBounds(circle.getBounds());
    }

    //follow the marker



    map.setView([latitude, longitude]);
      
}


//if there is an error getting the user's location, alert the user
function error(err)
{
    if (err.code === 1) {
        alert("Please allow location access to use this feature.");
    } else {
        alert("Unable to retrieve your location. Please try again.");
    } 
}

    if (filterDropdown.style.display === 'block') {

    } else {
        filterDropdown.style.display = 'block';
    }
}

//search function
function filterHospitals(searchText) {

    let filtered = [];

    var i;
    for (i = 0; i < hospitals.length; i++) {

        var hospital = hospitals[i];

        var name = hospital.name.toLowerCase();
        var address = hospital.address.toLowerCase();
        var id = hospital.id.toString();

        if (
            name.indexOf(searchText) !== -1 ||
            address.indexOf(searchText) !== -1 ||
            id.indexOf(searchText) !== -1
        ) {
            filtered.push(hospital);
        }
    }

    return filtered;
}

//
function onSearchInput(event) {

    var text = event.target.value.toLowerCase();

    if (text === "") {
        renderHospitals(hospitals);
        return;
    }

    var results = filterHospitals(text);

    renderHospitals(results);
}

function sortByBeds() {

    hospitals.sort(function (a, b) {
        return b.beds - a.beds;
    });

    renderHospitals(hospitals);
}

function sortByEmergencySlots() {

    //"b.emergencySlots - a.emergencySlots" sorts the hospitals in descending order of emergency slots.
    hospitals.sort(function (a, b) {
        return b.emergencySlots - a.emergencySlots;
    });

    renderHospitals(hospitals);
}

function sortByDistance() {

    //"a.distance - b.distance" sorts the hospitals in ascending order of distance.
    hospitals.sort(function (a, b) {
        return a.distance - b.distance;
    });

    renderHospitals(hospitals);
}

//connect filter buttons to functions

bedsFilterBtn.addEventListener("click", sortByBeds);
emergencyFilterBtn.addEventListener("click", sortByEmergencySlots);
distanceFilterBtn.addEventListener("click", sortByDistance);
