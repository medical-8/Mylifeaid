<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <h1 style="text-align: center;">Login</h1>
    <p style="text-align: center;">Please enter your credentials to access the hospital dashboard</p>
    <form id="login-form" style="display: flex; flex-direction: column; align-items: center;">
        <div>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required placeholder="Enter your email">
        </div>
        <div>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required placeholder="Enter your password">
        </div>
        <button type="submit">Login</button>
    </form>
    <p style="text-align: center;">Don't have an account? <a href="signup.html">Sign up here</a></p>
    <p style="text-align: center;">Forgot password?<a href="#">Enter email and reset</a></p>

    <script type="module" src="./login.js"></script>
</body>


</html>
